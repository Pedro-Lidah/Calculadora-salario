<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">
</head>
<body>
    <header>
        <h1>Calculadora</h1>
    </header>

    <main>
        <form>
            Horas Trabalhadas <input type="time" id="horasTrabalhadas" placeholder="Horas Trabalhadas">
            Horas Extra (50%) <input type="time" id="horaExtra50" placeholder="Horas Extra (50%)">
            Horas Extra (100%) <input type="time" id="horaExtra" placeholder="Horas Extra (100%)">
            <input type="number" id="valorHora" step="0.01" placeholder="Pagamento por hora Trabalhada">

            <div id="botoes">
                <button type="submit" id="botaoCalcular">Calcular</button>
            </div>
        </form>
    </main>
    <footer>

    </footer>
<script src="script.js"></script>
</body>
</html>
