<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bloco">
    <header>
        <h1>Calculadora</h1>
    </header>

    <main>
        <form>
    Horas Trabalhadas <input type="text" id="horasTrabalhadas" placeholder="(HH:MM)">
    Horas Extra (50%) <input type="text" id="horaExtra50" placeholder="(HH:MM)">
    Horas Extra (100%) <input type="text" id="horaExtra" placeholder="(HH:MM)">
    
    <input type="number" id="valorHora" step="0.01" placeholder="Pagamento por hora Trabalhada" required>

    <div id="botoes">
        <button type="submit" id="botaoCalcular">Calcular</button>
    </div>

    <div id="resultadoBloco">
        <p id="resultadoValor">💰 Salário Total</p>
    </div>

    <div id="diasBloco">
      Dias Trabalhados:  <p id="diasTrabalhadosNormais">📅 Dias Trabalhados Normais</p>
      Dias Trabalhados (50%):  <p2 id="diasTrabalhadosExtra50">📅 Dias Trabalhados Extra 50%</p2>
      Dias Trabalhados (100%):  <p3 id="diasTrabalhadosExtra100">📅 Dias Trabalhados Extra 100%</p3>
    </div>
        </form>
    </div>
    </main>
    </div>
    <footer>

    </footer>
<script src="script.js"></script>
</body>
</html>
